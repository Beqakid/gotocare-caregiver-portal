<!DOCTYPE html>
<html data-theme="alfred-light">
  <head>
    <meta charset="utf-8" />
    <!-- SECURITY (RISK-04): Content Security Policy -->

    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="google-client-id" content="888877756290-t1chv8b5d5hg0kiosd4qcr34g6rpd33b.apps.googleusercontent.com" />
    <title>Carehia — Caregiver Portal</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- DaisyUI v5 + Tailwind v4 (browser build) -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/daisyui.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      [data-theme='alfred-light'] {
  color-scheme: light;
  --radius-selector: 1.5rem;
  --radius-field: 0.875rem;
  --radius-box: 1.25rem;
  --size-selector: 0.25rem;
  --size-field: 0.25rem;
  --border: 1px;
  --depth: 0;
  --noise: 0;
  /* Page bg — light slate; cards are white */
  --color-base-100: #F8FAFC;
  --color-base-200: #ffffff;
  --color-base-300: #ede9fe;
  --color-base-content: #1a1a2e;
  /* Carehia purple */
  --color-primary: #7c3aed;
  --color-primary-content: #ffffff;
  /* Carehia blue */
  --color-secondary: #3b82f6;
  --color-secondary-content: #ffffff;
  --color-accent: #7c3aed;
  --color-accent-content: #ffffff;
  --color-neutral: #374151;
  --color-neutral-content: #ffffff;
  --color-info: #3b82f6;
  --color-info-content: #ffffff;
  --color-success: #10b981;
  --color-success-content: #ffffff;
  --color-warning: #f59e0b;
  --color-warning-content: #ffffff;
  --color-error: #ef4444;
  --color-error-content: #ffffff;
}

[data-theme='alfred-dark'] {
  color-scheme: dark;
  --radius-selector: 1.5rem;
  --radius-field: 0.875rem;
  --radius-box: 1.25rem;
  --size-selector: 0.25rem;
  --size-field: 0.25rem;
  --border: 1px;
  --depth: 0;
  --noise: 0;
  --color-base-100: #0f0f23;
  --color-base-200: #1a1a2e;
  --color-base-300: #16213e;
  --color-base-content: #e2e8f0;
  --color-primary: #7c3aed;
  --color-primary-content: #ffffff;
  --color-secondary: #3b82f6;
  --color-secondary-content: #ffffff;
  --color-accent: #7c3aed;
  --color-accent-content: #ffffff;
  --color-neutral: #374151;
  --color-neutral-content: #ffffff;
  --color-info: #3b82f6;
  --color-info-content: #ffffff;
  --color-success: #10b981;
  --color-success-content: #ffffff;
  --color-warning: #f59e0b;
  --color-warning-content: #ffffff;
  --color-error: #ef4444;
  --color-error-content: #ffffff;
}

body { font-family: 'Inter', sans-serif; }
* { -webkit-tap-highlight-color: transparent; }
    </style>
  </head>
  <body class="bg-base-100 text-base-content">
    <div id="root"></div>

    <!-- Auto dark/light theme detection -->
    <script>
        var theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'alfred-dark' : 'alfred-light';
        document.documentElement.setAttribute('data-theme', theme);
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
          document.documentElement.setAttribute('data-theme', e.matches ? 'alfred-dark' : 'alfred-light');
        });
    </script>

    <!-- App bundle -->
    <script type="module" src="dist/app.js"></script>

    <!-- Service Worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').then(function(reg) {
            console.log('SW registered:', reg.scope);
          }).catch(function(err) {
            console.log('SW registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
