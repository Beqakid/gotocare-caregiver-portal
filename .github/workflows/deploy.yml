name: Build & Deploy Caregiver Portal

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install react react-dom lucide-react esbuild

      - name: Build (code-split ESM)
        run: |
          npx esbuild app.tsx \
            --bundle \
            --splitting \
            --format=esm \
            --outdir=dist \
            --platform=browser \
            --target=es2020 \
            --loader:.tsx=tsx \
            --loader:.ts=tsx \
            --minify

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: c1e395b56bdff4ca909cbf0d56a527b5
          command: pages deploy . --project-name=gotocare-caregiver-portal
